---
- name: Copy Zabbix frontend to Nginx root
  ansible.builtin.copy:
    src: "{{ zabbix_source_path }}/ui"
    dest: /usr/share/zabbix
    owner: nginx
    group: nginx
    mode: "0755"
  tags:
    - web

- name: Ensure proper permissions on frontend files
  ansible.builtin.file:
    path: /usr/share/zabbix
    state: directory
    owner: nginx
    group: nginx
    recurse: true
  tags:
    - web

- name: Reload Nginx after frontend deployment
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  tags:
    - web