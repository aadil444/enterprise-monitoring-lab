---
# tasks file for roles/postgresql

- name: Download PostgreSQL repository RPM
  ansible.builtin.get_url:
    url: https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
    dest: /tmp/pgdg-redhat-repo-latest.noarch.rpm
    mode: "0644"
  tags:
    - repo

- name: Verify PostgreSQL repository RPM exists
  ansible.builtin.stat:
    path: /tmp/pgdg-redhat-repo-latest.noarch.rpm
  register: pgdg_rpm
  tags:
    - repo

- name: Fail if PostgreSQL repository RPM is missing
  ansible.builtin.fail:
    msg: "PostgreSQL repository RPM was not downloaded"
  when:
    - not ansible_check_mode
    - not pgdg_rpm.stat.exists
  tags:
    - repo

- name: Install PostgreSQL repository RPM
  ansible.builtin.dnf:
    name: /tmp/pgdg-redhat-repo-latest.noarch.rpm
    state: present
  tags:
    - repo

- name: Refresh DNF metadata
  ansible.builtin.dnf:
    update_cache: true
  tags:
    - repo

- name: Disable default PostgreSQL module
  ansible.builtin.command:
    cmd: dnf -qy module disable postgresql
  changed_when: false
  tags:
    - repo

- name: Install PostgreSQL packages
  ansible.builtin.dnf:
    name: "{{ postgresql_packages }}"
    state: present
  tags:
    - packages

- name: Initialize PostgreSQL database
  ansible.builtin.command:
    cmd: /usr/pgsql-{{ postgresql_version }}/bin/postgresql-{{ postgresql_version }}-setup initdb
    creates: /var/lib/pgsql/{{ postgresql_version }}/data/PG_VERSION
  tags:
    - init


- name: Enable and start PostgreSQL service
  ansible.builtin.service:
    name: "{{ postgresql_service }}"
    enabled: true
    state: started
  tags:
    - service

- name: Configure PostgreSQL server settings
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: /var/lib/pgsql/{{ postgresql_version }}/data/postgresql.conf
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - Restart PostgreSQL
  tags:
    - config


- name: Configure PostgreSQL client authentication
  ansible.builtin.template:
    src: pg_hba.conf.j2
    dest: /var/lib/pgsql/{{ postgresql_version }}/data/pg_hba.conf
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - Restart PostgreSQL
  tags:
    - config

- name: Install PostgreSQL Python dependency
  ansible.builtin.dnf:
    name:
      - python3-psycopg2
    state: present
  tags:
    - database

- name: Create Zabbix database
  community.postgresql.postgresql_db:
    name: "{{ postgresql_database }}"
    state: present
    encoding: UTF8
  become_user: postgres
  tags:
    - database

- name: Create Zabbix database user
  community.postgresql.postgresql_user:
    name: "{{ postgresql_user }}"
    password: "{{ postgresql_password }}"
    state: present
  become_user: postgres
  tags:
    - database

- name: Grant database privileges to Zabbix user
  community.postgresql.postgresql_privs:
    database: "{{ postgresql_database }}"
    roles: "{{ postgresql_user }}"
    type: database
    privs: ALL
  become_user: postgres
  tags:
    - database        
