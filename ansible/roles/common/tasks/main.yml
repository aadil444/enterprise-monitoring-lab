---
- name: Update all packages
  ansible.builtin.dnf:
    name: "*"
    state: latest
    update_cache: true
  tags:
    - update

- name: Install common packages
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
  tags:
    - packages

- name: Ensure chronyd service is enabled and running
  ansible.builtin.service:
    name: chronyd
    enabled: true
    state: started
  tags:
    - services

- name: Ensure firewalld service is enabled and running
  ansible.builtin.service:
    name: firewalld
    enabled: true
    state: started
  tags:
    - services

- name: Ensure system timezone is configured
  ansible.builtin.timezone:
    name: "{{ timezone }}"
  tags:
    - timezone

- name: Gather system facts
  ansible.builtin.setup:
  tags:
    - facts

- name: Display hostname
  ansible.builtin.debug:
    msg: "Configuring {{ inventory_hostname }}"
  tags:
    - debug

- name: Configure /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
    backup: true
  tags:
    - hosts
