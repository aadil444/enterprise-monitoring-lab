---
- name: Create Zabbix group
  ansible.builtin.group:
    name: "{{ zabbix_group }}"
    state: present
  tags:
    - user


- name: Create Zabbix user
  ansible.builtin.user:
    name: "{{ zabbix_user }}"
    group: "{{ zabbix_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
  tags:
    - user


- name: Install Zabbix build dependencies
  ansible.builtin.dnf:
    name: "{{ zabbix_build_packages }}"
    state: present
  tags:
    - packages


- name: Create Zabbix source directory
  ansible.builtin.file:
    path: "{{ zabbix_source_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - source


- name: Clone Zabbix source code
  ansible.builtin.git:
    repo: https://github.com/zabbix/zabbix.git
    dest: "{{ zabbix_source_path }}"
    version: "{{ zabbix_version }}"
    update: false
  tags:
    - source


- name: Verify Zabbix source checkout
  ansible.builtin.stat:
    path: "{{ zabbix_source_path }}/configure.ac"
  register: zabbix_source_check
  tags:
    - source


- name: Fail if Zabbix source checkout is invalid
  ansible.builtin.fail:
    msg: "Zabbix source checkout is incomplete"
  when: not zabbix_source_check.stat.exists
  tags:
    - source


- name: Set ownership on Zabbix source directory
  ansible.builtin.file:
    path: "{{ zabbix_source_path }}"
    owner: root
    group: root
    recurse: true
  tags:
    - source


- name: Include Zabbix bootstrap tasks
  ansible.builtin.include_tasks:
    file: bootstrap.yml
  tags:
    - bootstrap


- name: Include Zabbix configure tasks
  ansible.builtin.include_tasks:
    file: configure.yml
  tags:
    - configure


- name: Include Zabbix make tasks
  ansible.builtin.include_tasks:
    file: make.yml
  tags:
    - make

- name: Include Zabbix install tasks
  ansible.builtin.include_tasks:
    file: install.yml
  tags:
    - install 

- name: Include Zabbix service tasks
  ansible.builtin.include_tasks:
    file: service.yml
  tags:
    - service  

- name: Include Zabbix configuration tasks
  ansible.builtin.include_tasks:
    file: config.yml
  tags:
    - config    

- name: Include Zabbix database tasks
  ansible.builtin.include_tasks:
    file: database.yml
  tags:
    - database   

- name: Include Zabbix service tasks
  ansible.builtin.include_tasks:
    file: service.yml
  tags:
    - service   

- name: Create Zabbix host via API
  ansible.builtin.include_tasks: api-host.yml
  tags:
    - config            