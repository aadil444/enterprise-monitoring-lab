---
- name: Create Zabbix group
  ansible.builtin.group:
    name: "{{ zabbix_group }}"
    state: present
  tags:
    - user


- name: Create Zabbix user
  ansible.builtin.user:
    name: "{{ zabbix_user }}"
    group: "{{ zabbix_group }}"
    shell: /sbin/nologin
    system: true
    create_home: false
  tags:
    - user

- name: Install Zabbix build dependencies
  ansible.builtin.dnf:
    name: "{{ zabbix_build_packages }}"
    state: present
  tags:
    - packages

- name: Create Zabbix source directory
  ansible.builtin.file:
    path: "{{ zabbix_source_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - source

- name: Clone Zabbix source code
  ansible.builtin.git:
    repo: https://github.com/zabbix/zabbix.git
    dest: "{{ zabbix_source_path }}"
    version: "{{ zabbix_version }}"
    update: false
  tags:
    - source

- name: Set ownership on Zabbix source directory
  ansible.builtin.file:
    path: "{{ zabbix_source_path }}"
    owner: "{{ zabbix_user }}"
    group: "{{ zabbix_group }}"
    recurse: true
  tags:
    - source            