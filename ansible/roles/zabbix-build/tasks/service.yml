---
- name: Ensure Zabbix server binary is owned by zabbix
  ansible.builtin.file:
    path: /usr/local/sbin/zabbix_server
    owner: "{{ zabbix_user }}"
    group: "{{ zabbix_group }}"
    mode: "0755"
  tags:
    - service

- name: Ensure Zabbix agent binary is owned by zabbix
  ansible.builtin.file:
    path: /usr/local/sbin/zabbix_agentd
    owner: "{{ zabbix_user }}"
    group: "{{ zabbix_group }}"
    mode: "0755"
  tags:
    - service

- name: Deploy Zabbix server systemd service
  ansible.builtin.template:
    src: zabbix-server.service.j2
    dest: /etc/systemd/system/zabbix-server.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
  tags:
    - service

- name: Deploy Zabbix agent systemd service
  ansible.builtin.template:
    src: zabbix-agent.service.j2
    dest: /etc/systemd/system/zabbix-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
  tags:
    - service

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  tags:
    - service

- name: Enable and start Zabbix server service
  ansible.builtin.service:
    name: zabbix-server
    enabled: true
    state: started
  tags:
    - service

- name: Enable and start Zabbix agent service
  ansible.builtin.service:
    name: zabbix-agent
    enabled: true
    state: started
  tags:
    - service