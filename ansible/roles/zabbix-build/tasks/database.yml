---
- name: Install PostgreSQL client on mon01
  ansible.builtin.dnf:
    name:
      - postgresql
      - postgresql-contrib
    state: present
  tags:
    - database

- name: Generate Zabbix database schema
  ansible.builtin.command:
    cmd: make dbschema
    chdir: "{{ zabbix_source_path }}"
    creates: "{{ zabbix_source_path }}/database/postgresql/schema.sql"
  tags:
    - database

- name: Verify PostgreSQL schema file exists
  ansible.builtin.stat:
    path: "{{ zabbix_source_path }}/database/postgresql/schema.sql"
  register: zabbix_schema
  tags:
    - database

- name: Fail if PostgreSQL schema is missing
  ansible.builtin.fail:
    msg: "Zabbix PostgreSQL schema was not generated"
  when: not zabbix_schema.stat.exists
  tags:
    - database

- name: Import Zabbix schema
  ansible.builtin.shell:
    cmd: |
      psql -h {{ zabbix_db_host }} -U {{ zabbix_db_user }} -d {{ zabbix_db_name }} -f {{ zabbix_source_path }}/database/postgresql/schema.sql
  environment:
    PGPASSWORD: "{{ zabbix_db_password }}"
  tags:
    - database

- name: Import Zabbix initial data
  ansible.builtin.shell:
    cmd: |
      psql -h {{ zabbix_db_host }} -U {{ zabbix_db_user }} -d {{ zabbix_db_name }} -f {{ zabbix_source_path }}/database/postgresql/data.sql
  environment:
    PGPASSWORD: "{{ zabbix_db_password }}"
  tags:
    - database

- name: Import Zabbix images
  ansible.builtin.shell:
    cmd: |
      psql -h {{ zabbix_db_host }} -U {{ zabbix_db_user }} -d {{ zabbix_db_name }} -f {{ zabbix_source_path }}/database/postgresql/images.sql
  environment:
    PGPASSWORD: "{{ zabbix_db_password }}"
  tags:
    - database