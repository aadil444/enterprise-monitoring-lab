---
- name: Prepare Zabbix Source Build Environment
  hosts: monitoring
  become: true

  roles:
    - zabbix-build

- name: Deploy Zabbix Web UI
  hosts: monitoring
  become: true
  roles:
    - role: zabbix-web
      vars:
        zabbix_source_path: /usr/local/src/zabbix-7.0.0
      tags:
        - web  